site_name: Matrix-Ke 的个人空间
site_description: 计算机图形学、物理渲染、实时渲染、数学、动画与物理模拟学习笔记
site_author: Matrix-Ke
site_url: https://matrix-ke.github.io/
repo_url: https://github.com/Matrix-Ke/matrix-ke.github.io
repo_name: Matrix-Ke/matrix-ke.github.io
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式
  features:
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

plugins:
  - search:
      lang:
        - zh
        - en

hooks:
  - hooks/math_fences.py

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - javascripts/mathjax.js
  - javascripts/portfolio.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Matrix-Ke
      name: Matrix-Ke on GitHub

copyright: Copyright &copy; Matrix-Ke

exclude_docs: |
  **/*.pdf
  **/PDF/**
  **/coursePPT/**
